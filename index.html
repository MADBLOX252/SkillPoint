<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillPoint - IGCSE & A-Level Hub</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                bg: '#0a0a0a',
                accent: '#00ff88',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>

    <!-- Global Styles -->
    <link rel="stylesheet" href="./src/index.css">

    <!-- Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@latest/dist/lenis.min.js"></script>
  </head>
  <body class="bg-brand-bg text-white selection:bg-brand-accent selection:text-black min-h-screen overflow-x-hidden">
    <!-- Custom Cursor -->
    <div id="cursor" class="custom-cursor"></div>
    <div id="cursor-dot" class="custom-cursor-dot"></div>

    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 py-6 px-6">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="#/" class="flex items-center gap-2 group">
          <div class="w-10 h-10 bg-brand-accent rounded-xl flex items-center justify-center rotate-3 group-hover:rotate-12 transition-transform duration-500 shadow-[0_0_20px_rgba(0,255,136,0.3)]">
            <i data-lucide="graduation-cap" class="text-black w-6 h-6"></i>
          </div>
          <span class="text-2xl font-bold tracking-tighter">Skill<span class="text-brand-accent">Point</span></span>
        </a>

        <div class="flex items-center gap-1 glass p-1 rounded-full">
          <a href="#/" data-nav-link="/" class="flex items-center gap-2 px-6 py-2 rounded-full text-sm font-medium transition-all hover:text-brand-accent">
            <i data-lucide="home" class="w-4 h-4"></i> Home
          </a>
          <a href="#/subjects" data-nav-link="/subjects" class="flex items-center gap-2 px-6 py-2 rounded-full text-sm font-medium transition-all hover:text-brand-accent">
            <i data-lucide="book-open" class="w-4 h-4"></i> Subjects
          </a>
        </div>
      </div>
    </nav>

    <!-- App Content Wrapper -->
    <div id="app"></div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 md:p-10 pointer-events-none">
      <div class="absolute inset-0 bg-black/90 backdrop-blur-xl pointer-events-auto" onclick="closePreview()"></div>
      <div class="relative w-full h-full max-w-6xl glass rounded-[2rem] border border-white/10 overflow-hidden flex flex-col pointer-events-auto shadow-2xl">
        <div class="p-6 flex items-center justify-between border-b border-white/10 bg-white/5">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-brand-accent/20 rounded-xl flex items-center justify-center text-brand-accent">
              <i data-lucide="file-text" class="w-6 h-6"></i>
            </div>
            <div>
              <h3 id="preview-title" class="font-bold text-lg leading-tight">Document Preview</h3>
              <p class="text-xs text-white/30 uppercase tracking-widest font-mono">SkillPoint Academic Viewer</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <a id="preview-external" href="#" target="_blank" class="flex items-center gap-2 px-5 py-2.5 bg-white text-black rounded-full font-bold text-sm hover:bg-brand-accent transition-colors">
              <i data-lucide="external-link" class="w-4 h-4"></i> Open in New Tab
            </a>
            <button onclick="closePreview()" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
          </div>
        </div>
        <div class="flex-1 w-full relative bg-white/5">
          <iframe id="preview-iframe" src="" class="w-full h-full border-none"></iframe>
          <div id="preview-loader" class="absolute inset-0 flex items-center justify-center bg-brand-bg">
            <div class="flex flex-col items-center gap-4 text-brand-accent">
              <div class="w-12 h-12 border-4 border-brand-accent/20 border-t-brand-accent rounded-full animate-spin"></div>
              <span class="text-xs font-mono uppercase tracking-widest animate-pulse">Loading Document...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer id="main-footer" class="py-20 px-6 border-t border-white/5 text-center">
      <div class="text-4xl font-bold tracking-tighter mb-4">
        <span class="text-white">Skill</span>
        <span class="text-brand-accent">Point</span>
      </div>
      <p class="text-white/40 text-sm">Empowering students to succeed, together.</p>
    </footer>

    <!-- Main JS -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
